identifier: de.mybuho.buhogo
name: BuhoGO
summary: Bitcoin payments made simple
description: |
  BuhoGO is an open-source Bitcoin and Lightning wallet for mobile.
  Connect the wallets you already use through Nostr Wallet Connect (NWC) or LNBits, or create and restore a self-custodial Spark wallet inside the app.

  BuhoGO is built for fast everyday payments with a clean interface for sending, receiving, and managing multiple wallets in one place.
  It works well for first-time Bitcoin users and for people who already have their own setup.

  ## Key Features
  - Open-source wallet with self-custodial Spark support
  - Connect multiple NWC and LNBits wallets
  - Create or restore a Spark wallet with seed backup and PIN protection
  - Pay Lightning invoices, Lightning addresses, LNURL requests, and Spark addresses
  - Receive with invoices, Lightning addresses, and Spark address QR codes
  - Spark on-chain receive and Bitcoin withdrawals
  - Contacts and address book for faster repeat payments
  - Batch payments to multiple contacts
  - Easy sats transfers between your connected wallets
  - Auto-withdraw to move funds automatically once a threshold is reached
  - Transaction history with fiat conversion
  - Dark and light themes
  - Multi-language support

  ## Why BuhoGO?
  Unlike wallets that lock you into a single provider, BuhoGO works with your existing stack or lets you start fresh with Spark in minutes.
  It is designed for clarity, speed, and flexibility without giving up self-custody.
