# Zapstore publish config (zsp schema) - https://zapstore.dev/docs/publish
# Publish with:  SIGN_WITH=<nsec|bunker> zsp publish zapstore.yaml
# The app id (mybuho.buhogo) and version (1.8.3) are read from the APK below.

# Source code repository (shown in the app store)
repository: https://github.com/Buho-Ecosystem/Buho_go

# Where to fetch the APK. A local path lets us ship the local icon and
# screenshots below. Bump this filename on each release.
release_source: ./output/BuhoGO_v1_8_3.apk

# ---------------------------------------------------------------------------
# App metadata
# ---------------------------------------------------------------------------
name: BuhoGO
summary: The friendly Bitcoin and Lightning wallet

description: |
  BuhoGO is a friendly, open-source Bitcoin and Lightning wallet. Hold your own keys, pay anyone, and spend anywhere, all from one clean app.

  Bring the wallets you already use through Nostr Wallet Connect (NWC) or LNbits, or create a self-custodial Spark wallet right inside BuhoGO. Switch between your Business and Personal balances with a tap.

  ## What you can do
  - Pay Lightning invoices, Lightning addresses, LNURL, and Spark addresses
  - Send to a Nostr profile or a NIP-05 name
  - Scan any QR, including LNbits and Bitcoin ATM withdraw codes
  - Receive over Lightning, on-chain, and with Spark address QR codes
  - Discover Bitcoin-friendly places near you on the built-in map
  - Buy eSIMs and VPNs, and browse online and Nostr shops without leaving the app
  - Pay many contacts at once with batch payments
  - Move funds automatically with Auto-Transfer, over Lightning or on-chain
  - Keep an address book for faster repeat payments
  - Follow your history with live fiat conversion
  - Switch between a polished dark and light theme, in your language

  ## Why BuhoGO?
  Most wallets lock you into one provider. BuhoGO works with the setup you already have, or lets you start fresh with Spark in minutes. It is built for clarity, speed, and self-custody, without the jargon.

# SPDX license identifier (the repo ships the GNU AGPL v3)
license: AGPL-3.0-only

website: https://home.mybuho.de/buhogo

tags:
  - bitcoin
  - lightning
  - wallet
  - payments
  - nostr
  - nostrcore
  - nwc
  - lnbits
  - spark
  - self-custody
  - ark

